<!--
  index.html – A központi felület
  Ez a felület kezeli a bejelentkezést, listázza a többi online felhasználót, és biztosítja a helyet a képek megjelenítésének.
  
  TODO:
  - mappába lépéskor nem listázza ki a mappában található fájlokat, mappákat
  - speciális nevű fájlokat nem nyit meg
  - kisképeket nem küldi át a fájllistával együtt, nem jeleníti meg
    (de valamiért a kisképek neve megjelenik, aminek nem kéne)
  - messaging.php: A régi üzeneteket törölje, amik nem lettek kézbesítve.
  - PHP-től jöjjön az peer ID.
  - SQLite3 adatbázis használata.
-->
<!DOCTYPE html>
<html lang="hu">
 <head>
  <meta charset="utf-8">
  <title>Picasa (P2P Fényképmegosztó)</title>
  <style type="text/css">
   .peer-list { border: 1px solid #ccc; padding: 10px; width: 200px; cursor: pointer; }
   .peer-item:hover { background: #eee; }
   #photo-container img { max-width: 500px; display: block; margin: 10px 0; }
  </style>
  <script type="text/javascript" src="js/jquery.1.12.4.min.js"></script>
  <script type="text/javascript" src="webrtc.js"></script>
  <script type="text/javascript" src="view_photos.js"></script>
 </head>
<body>

<h1>Saját azonosító: <span id="my-id">...</span></h1>
<div>
 <h3>Elérhető kapcsolatok:</h3>
 <div id="peer-list-container" class="peer-list">Frissítés...</div>
</div>
<hr>
<div id="photo-container">
 <h3>Megosztott fényképek:</h3>
 <!-- Ide érkeznek majd a képek a P2P csatornán keresztül -->
 <div id="file-list"></div>
 <div id="display-image"></div>
</div>

<script type="text/javascript">
const PEER_LIST_REFRESH_INTERVAL = 5000; // ms
const MESSAGE_POLLING_INTERVAL = 2000; // ms

// Generálunk egy egyedi ID-t (vagy a PHP is adhatná)
const myId = "user_" + Math.random().toString(36).substr(2, 5);
document.getElementById("my-id").innerText = myId;

startRefreshingPeerList();
startPollingMessages(myId);

function startRefreshingPeerList() {
  $.get("peers.php", {myId: myId}, function(peers){
    const container = document.getElementById('peer-list-container');
    container.innerHTML = '';
    peers.forEach(function(peerId){
      if (peerId != myId) {
        const div = document.createElement('div');
        div.className = "peer-item";
        div.innerText = "Csatlakozás: " + peerId;
        div.onclick = function(){startConnection(peerId);}; // webrtc.js
        container.appendChild(div);
      }
    });
    setTimeout(startRefreshingPeerList, PEER_LIST_REFRESH_INTERVAL);
  });
}

function startPollingMessages(myId) {  // Bejövő WebRTC kérések figyelése.
  $.get("messaging.php", {myId: myId}, function(messages){
    messages.forEach(function(msg){
      console.log("Új üzenet érkezett innen:", msg.senderId);
      handleIncomingSignaling(msg.senderId, msg.payload);  // webrtc.js
    });
    setTimeout(function(){startPollingMessages(myId);}, MESSAGE_POLLING_INTERVAL);
  });
}
</script>
</body>
</html>
